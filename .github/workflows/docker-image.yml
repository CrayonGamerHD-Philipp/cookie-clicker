name: build-and-push
run-name: build-and-push (${{ github.ref_name }})

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize image name
        shell: bash
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Fetch tags
        shell: bash
        run: git fetch --force --tags

      - name: Compute release version
        id: version
        shell: bash
        env:
          TZ: Europe/Berlin
        run: |
          set -euo pipefail
          date_prefix="$(date +'%Y.%m.%d')"
          tag_prefix="v${date_prefix}."
          latest_index="$(git tag -l "${tag_prefix}*" | sed -E "s/^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.//" | sort -n | tail -n 1)"

          if [ -z "${latest_index}" ]; then
            next_index=1
          else
            next_index="$((latest_index + 1))"
          fi

          version_tag="${tag_prefix}${next_index}"

          echo "date_prefix=${date_prefix}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version_tag }}"
          git push origin "${{ steps.version.outputs.version_tag }}"

      - name: Inject app version into website
        shell: bash
        run: |
          set -euo pipefail
          perl -0pi -e 's#<span id="appVersion">.*?</span>#<span id="appVersion">${{ steps.version.outputs.version_tag }}</span>#g' src/routes/+page.svelte

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Wait for GHCR availability
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            code="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 8 --max-time 20 "https://${{ env.REGISTRY }}/v2/" || true)"
            if [ "$code" = "200" ] || [ "$code" = "401" ] || [ "$code" = "405" ]; then
              echo "GHCR reachable on attempt ${attempt} (HTTP ${code})."
              exit 0
            fi
            echo "GHCR not reachable (attempt ${attempt}/5, HTTP ${code}), retrying in 10s..."
            sleep 10
          done
          echo "GHCR endpoint did not respond in time."
          exit 1

      - name: Log in to GHCR (retry)
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if printf '%s' "$GHCR_TOKEN" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin; then
              echo "Login successful on attempt ${attempt}."
              exit 0
            fi
            echo "GHCR login failed (attempt ${attempt}/5), retrying in 10s..."
            sleep 10
          done
          echo "Unable to log in to GHCR after retries."
          exit 1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version_tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          name: ${{ steps.version.outputs.version_tag }}
          generate_release_notes: true
